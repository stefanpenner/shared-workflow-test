name: Shadow test consumers

# On a labeled PR (or manual dispatch), run this PR's draft state against each real consumer under
# an authentic pull_request event in the shadow runner, and reflect the result back here.
# All logic lives in shadow/ in THIS repo and runs from this checkout; the runner repo is only the
# dispatch venue (see shadow/README and the receiver shim there).
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      pr:
        description: workflows PR number to shadow-test
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: shadow-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

env:
  RUNNER_REPO: stefanpenner-cs/reusable-workflows-shadow-testing

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'shadow-test')
    runs-on: ubuntu-latest
    outputs:
      consumers: ${{ steps.list.outputs.consumers }}
      pr: ${{ steps.ctx.outputs.pr }}
      sha: ${{ steps.ctx.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: actionlint (cheap gate on the workflows draft)
        run: bash scripts/shadow/actionlint.sh

      - name: Resolve PR + head SHA
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          INPUT_PR: ${{ inputs.pr }}
        run: bash scripts/shadow/resolve-ctx.sh

      - name: List consumers
        id: list
        env:
          CONSUMERS_FILE: ${{ github.workspace }}/.github/shadow-consumers.json
        run: node shadow/src/bin/list-consumers.ts

  shadow:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        consumer: ${{ fromJSON(needs.prepare.outputs.consumers) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Dispatch and watch
        run: node shadow/src/bin/dispatch-and-watch.ts
        env:
          RUNNER_REPO: ${{ env.RUNNER_REPO }}
          WORKFLOWS_REPO: ${{ github.repository }}
          WORKFLOWS_REF: ${{ needs.prepare.outputs.sha }}
          WORKFLOWS_PR: ${{ needs.prepare.outputs.pr }}
          CONSUMER_REPO: ${{ matrix.consumer.repo }}
          CONSUMER_REF: ${{ matrix.consumer.ref }}
          SHADOW_PAT: ${{ secrets.SHADOW_PAT }}
