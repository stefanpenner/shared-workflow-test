name: Shadow cleanup

# When a workflows PR closes, tear down its shadow PRs + branches in the runner.
# Runs shadow/cmd from this repo's own checkout (Bazel builds it).
on:
  pull_request:
    types: [closed]

permissions:
  contents: read

env:
  RUNNER_REPO: stefanpenner-cs/reusable-workflows-shadow-testing

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Tear down shadow PRs + branches
        env:
          SHADOW_PAT: ${{ secrets.SHADOW_PAT }}
        run: bazelisk run //shadow/cmd/cleanup -- --runner-repo=${{ env.RUNNER_REPO }} --workflows-pr=${{ github.event.pull_request.number }} --consumers-file=${{ github.workspace }}/.github/shadow-consumers.json
