name: Shadow cleanup

# When a workflows PR closes, tear down its shadow PRs + branches in the runner.
# Runs shadow/ from this repo's own checkout (cleanup is dependency-free → raw Node 24).
on:
  pull_request:
    types: [closed]

permissions:
  contents: read

env:
  RUNNER_REPO: stefanpenner-cs/reusable-workflows-shadow-testing

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Tear down shadow PRs + branches
        env:
          SHADOW_PAT: ${{ secrets.SHADOW_PAT }}
        run: node shadow/src/bin/cleanup.ts --runner-repo=${{ env.RUNNER_REPO }} --workflows-pr=${{ github.event.pull_request.number }} --consumers-file=${{ github.workspace }}/.github/shadow-consumers.json
