name: Test

# One harness for the whole repo: static gates (no-inline guard, eslint + prettier, dep policy,
# isolated tsc) plus a single `node --test` run covering the actions (.mjs), shared scripts (.mjs),
# and shadow/ (.mts, run natively on Node 24). npm appears only in the lint/typecheck drivers.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: No inline scripts
        run: node scripts/lib/guard/check-no-inline-scripts.cli.mjs

      # Lint the repo's own .mjs + YAML. Installs root dev tooling (eslint + prettier) and runs both.
      - name: Lint (eslint + prettier)
        run: node scripts/lint.mjs

      - name: Dependency policy (yaml only)
        run: node shadow/src/bin/check-deps.mts

      # Isolated type-check: Node strips types at runtime; this is the only place npm/tsc appears.
      # It also installs shadow's deps (yaml) so the test step below can resolve them.
      - name: Typecheck (isolated tsc)
        run: node shadow/typecheck.mjs

      # Tests + coverage gate for the whole repo. One arg per line so it reads top-to-bottom; the
      # globs are single-quoted so Node — not the shell — expands them. Repo-wide globs: run every
      # *.test.{mjs,mts}, cover every source module, and exclude the layers we don't unit-test by
      # convention — tests, action entrypoints (*.cli.mjs), binaries (bin/), and I/O adapters.
      - name: Tests + coverage
        run: node --test
          --experimental-test-coverage
          --test-coverage-lines=95
          --test-coverage-functions=100
          --test-coverage-branches=90
          --test-coverage-include='**/*.{mjs,mts}'
          --test-coverage-exclude='**/*.test.*'
          --test-coverage-exclude='**/*.cli.mjs'
          --test-coverage-exclude='**/bin/**'
          --test-coverage-exclude='**/adapters/**'
          '**/*.test.{mjs,mts}'
