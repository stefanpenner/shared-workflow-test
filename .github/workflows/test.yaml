name: Test

# One harness for the whole repo: static gates (no-inline guard, eslint + prettier, dep policy,
# isolated tsc) plus a single `node --test` run covering the actions (.mjs), shared scripts (.mjs),
# and shadow/ (.mts, run natively on Node 24). npm appears only in the lint/typecheck drivers.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: No inline scripts
        run: node scripts/lib/guard/check-no-inline-scripts.cli.mjs

      # Lint the repo's own .mjs + YAML. Installs root dev tooling (eslint + prettier) and runs both.
      - name: Lint (eslint + prettier)
        run: node scripts/lint.mjs

      - name: Dependency policy (yaml only)
        run: node shadow/src/bin/check-deps.mts

      # Isolated type-check: Node strips types at runtime; this is the only place npm/tsc appears.
      # It also installs shadow's deps (yaml) so the test step below can resolve them.
      - name: Typecheck (isolated tsc)
        run: node shadow/typecheck.mjs

      # Single test command for the whole repo, coverage-gated. Globs are single-quoted so Node
      # (not the shell) expands them; coverage covers the pure layers (bins/adapters excluded).
      - name: Tests + coverage
        run: node --test --experimental-test-coverage --test-coverage-lines=95 --test-coverage-functions=100 --test-coverage-branches=90 '--test-coverage-include=actions/**/*.mjs' '--test-coverage-include=scripts/**/*.mjs' '--test-coverage-include=shadow/src/**/*.mts' '--test-coverage-exclude=**/*.test.*' '--test-coverage-exclude=**/*.cli.mjs' '--test-coverage-exclude=shadow/src/bin/**' '--test-coverage-exclude=shadow/src/adapters/**' 'actions/**/*.test.mjs' 'scripts/**/*.test.mjs' 'shadow/test/*.test.mts'
