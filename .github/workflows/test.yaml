name: Test

# One harness for the whole repo, all Go built with Bazel: the no-inline guard, golangci-lint +
# yamllint (hermetic, via //tools:lint), `bazel test //...` (every *_test.go), and a line-coverage
# gate — every step runs through bazelisk (pinned by .bazelversion); no host Go toolchain needed.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      # Hermetic workbench (see CLAUDE.md): no-inline-scripts guard + golangci-lint + yamllint,
      # all Bazel-pinned. Replaces the golangci-lint/yamllint marketplace actions so CI and
      # `bazel run //tools:lint` locally run byte-identical tool versions.
      - name: Lint
        run: bazelisk run //tools:lint

      - name: Build + test
        run: bazelisk test //... --config=ci

      - name: Coverage gate
        run: bazelisk run //tools/covergate -- -min 90
