name: Test

# One harness for the whole repo, all Go built with Bazel: the no-inline guard, `bazel test //...`
# (every *_test.go), golangci-lint + yamllint, and a line-coverage gate. Bazel is pinned by
# .bazelversion (read by bazelisk); golangci-lint/yamllint/covergate use a host Go toolchain.
on:
  push:
    branches: ['**'] # every branch, so WIP commits get CI (not just main / PRs)
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: No inline scripts
        run: bazelisk run //tools/guard

      - name: Build + test
        run: bazelisk test //... --config=ci

      - name: Lint (Go)
        uses: golangci/golangci-lint-action@v6

      - name: Lint (YAML)
        uses: ibiqlik/action-yamllint@v3

      - name: Coverage gate
        run: go run ./tools/covergate -min 90
