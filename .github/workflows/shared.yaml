name: Shared Workflow

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: true
      project-name:
        type: string
        default: my-project

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Check this repo's actions out OUTSIDE the workspace (../_reusable-workflows), so they never
      # show in the consumer's git status — no .git/info/exclude needed — then reference them via
      # traversal `uses: ./../_reusable-workflows/...`. The checkout action is pinned to a literal
      # ref (a `uses:` ref can't be an expression); it checks the provider out at the `ref` input.
      - name: Set up shared actions
        uses: stefanpenner/checkout-anywhere@v1
        with:
          repository: stefanpenner-cs/reusable-workflows
          ref: ${{ inputs.ref || 'main' }}
          path: ../_reusable-workflows

      # The actions are Go binaries built on demand by Bazel (each `run:` is `bazelisk run //…`).
      # Install + cache bazelisk here so the first action pays a warm build, not a cold one.
      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Debug
        uses: ./../_reusable-workflows/actions/debug

      - name: Setup
        uses: ./../_reusable-workflows/actions/setup
        with:
          project-name: ${{ inputs.project-name }}

      - name: Lint
        uses: ./../_reusable-workflows/actions/lint

      - name: Test
        uses: ./../_reusable-workflows/actions/test
        with:
          suite: integration
