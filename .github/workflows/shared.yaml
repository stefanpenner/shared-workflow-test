name: Shared Workflow

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: true
      project-name:
        type: string
        default: my-project

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Clone this repo's actions OUTSIDE the workspace (../_reusable-workflows), so they never show in
      # the consumer's git status — no .git/info/exclude needed — then reference them via traversal
      # `uses: ./../_reusable-workflows/...`. The clone action is pinned to a literal ref (a `uses:`
      # ref can't be an expression); it clones the provider at the dynamic `ref` input.
      - name: Set up shared actions
        uses: stefanpenner-cs/clone-action@v1
        with:
          repository: stefanpenner-cs/reusable-workflows
          ref: ${{ inputs.ref || 'main' }}
          path: ../_reusable-workflows

      - name: Debug
        uses: ./../_reusable-workflows/actions/debug

      - name: Setup
        uses: ./../_reusable-workflows/actions/setup
        with:
          project-name: ${{ inputs.project-name }}

      - name: Lint
        uses: ./../_reusable-workflows/actions/lint

      - name: Test
        uses: ./../_reusable-workflows/actions/test
        with:
          suite: integration
