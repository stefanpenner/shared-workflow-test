name: Self-hosted smoke
on: { workflow_dispatch: {} }
jobs:
  smoke:
    runs-on: [self-hosted, local-cache]
    steps:
      - run: |
          echo "host: $(hostname)"
          cat /etc/bazel.bazelrc
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
      - name: Build via the local remote cache
        run: |
          set -o pipefail
          which bazel bazelisk 2>&1 || true
          # --announce_rc proves the system rc (/etc/bazel.bazelrc) injected --remote_cache
          bazel build //actions/... --announce_rc --color=no 2>&1 | tail -40
