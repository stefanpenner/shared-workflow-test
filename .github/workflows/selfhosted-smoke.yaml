name: Self-hosted smoke
on: { workflow_dispatch: {} }
jobs:
  smoke:
    runs-on: [self-hosted, local-cache]
    steps:
      - run: echo "host: $(hostname)"
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.19.0
      - name: Build via the local caches
        run: |
          set -o pipefail
          /usr/bin/time -v bazel build //actions/... 2>&1 | tail -45 || bazel build //actions/... 2>&1 | tail -45
