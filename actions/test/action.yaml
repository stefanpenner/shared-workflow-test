name: Test
description: Run the test suite

inputs:
  suite:
    description: Which test suite to run
    default: unit
  coverage:
    description: Enable coverage reporting
    default: "true"

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ github.action_path }}
      run: "bazelisk run //actions/test -- --suite='${{ inputs.suite }}' --coverage='${{ inputs.coverage }}'"
