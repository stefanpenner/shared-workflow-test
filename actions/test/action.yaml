name: Test
description: Run the test suite

inputs:
  suite:
    description: Which test suite to run
    default: unit
  coverage:
    description: Enable coverage reporting
    default: "true"

runs:
  using: composite
  steps:
    - shell: bash
      run: "node ${{ github.action_path }}/scripts/test.cli.mjs --suite='${{ inputs.suite }}' --coverage='${{ inputs.coverage }}'"
