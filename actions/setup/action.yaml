name: Setup
description: Set up the project environment

inputs:
  project-name:
    description: Name of the project
    required: true
  node-version:
    description: Node version to use
    default: "20"

outputs:
  node_version:
    description: The resolved node version
    value: ${{ steps.run.outputs.node_version }}

runs:
  using: composite
  steps:
    - id: run
      shell: bash
      working-directory: ${{ github.action_path }}
      run: "bazelisk run //actions/setup -- --project-name='${{ inputs.project-name }}' --node-version='${{ inputs.node-version }}'"
